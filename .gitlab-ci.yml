image: python:3.11-slim

before_script:
  - pip install --upgrade pip
  - pip install -r requirements.txt

pages:
  stage: deploy
  tags:
    - hva
  script:
    - mkdocs build --site-dir public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

variables:
  GIT_SUBMODULE_STRATEGY: recursive