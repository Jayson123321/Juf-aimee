services:
  postgres:
    image: postgres:16
    container_name: juf-aimee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: juf-aimee
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mkdocs:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "pip install -e /workspace/mdocotion &&
             mkdocs serve -a 0.0.0.0:8000"
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/workspace

volumes:
  postgres_data: