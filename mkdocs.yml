site_name: Juf Aimee — AI-onderwijsassistent
site_description: Documentatie van het Juf Aimee project — een AI-assistent voor leraren met hoogbegaafde leerlingen
site_author: Team Juf Aimee | Studio RAAI | HvA
copyright: Copyright 2026 Hogeschool van Amsterdam

theme:
    name: material
    custom_dir: mdocotion/
    features:
        - navigation.sections
        - navigation.expand
        - navigation.indexes
        - content.tabs.link
        - navigation.top
        - toc.follow

plugins:
    - search
    - mermaid2
    - awesome-pages
    - mkdocs-video
    - section-index
    - autolinks

markdown_extensions:
    - attr_list
    - md_in_html
    - tables
    - fenced_code
    - admonition
    - pymdownx.highlight:
          linenums: true
          use_pygments: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences:
        custom_fences:
          - name: mermaid
            class: mermaid
            format: !!python/name:mermaid2.fence_mermaid_custom
    - pymdownx.details
    - pymdownx.tasklist:
        custom_checkbox: true
